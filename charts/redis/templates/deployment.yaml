apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: redis:7.4 #https://github.com/docker-library/docs/tree/master/redis
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        command:
          - redis-server
        args:
          - /etc/redis/redis.conf
        ports:
          - name: redis
            containerPort: 6379
        env:
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Release.Name }}
                key: password
        startupProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: 5
          failureThreshold: 12
        livenessProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: 15
        readinessProbe:
          exec:
            command:
              - sh
              - -c
              - REDISCLI_AUTH="$REDIS_PASSWORD" redis-cli ping | grep -q PONG
          initialDelaySeconds: 5
        volumeMounts:
          - name: config
            mountPath: /etc/redis
            readOnly: true
          - name: data
            mountPath: /data
      volumes:
      - name: config
        secret:
          secretName: {{ .Release.Name }}
          items:
            - key: redis.conf
              path: redis.conf
      - name: data
        persistentVolumeClaim:
          claimName: {{ .Release.Name }}
